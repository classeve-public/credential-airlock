name: Feature request
description: Propose an improvement or integration.
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or risk should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Credential Airlock do?
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: How does this affect the trust boundary, vault, policy, audit, or admin UI?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
